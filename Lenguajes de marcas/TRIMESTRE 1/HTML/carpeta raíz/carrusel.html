<style>
.carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  gap: 1rem;
  padding: 1rem;
  padding-right: 3rem;
  background: #f5f5f5;
  border-radius: 12px;
}

.carousel > li {
  scroll-snap-align: center;
  scroll-snap-stop: always;
  flex: 0 0 auto;
  list-style: none;
}

.carousel img {
  width: 350px;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

.carousel::scroll-button(left) {
  content: "⬅" / "Scroll Left";
}

.carousel::scroll-button(right) {
  content: "➡" / "Scroll Right";
}

.carousel::scroll-button(*) {
  background: #0008;
  color: white;
  border-radius: 50%;
  padding: 0.5rem;
  font-size: 18px;
}

.controls {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  justify-content: center;
}

.controls a {
  padding: 0.6rem 1.2rem;
  background: #4a90e2;
  border-radius: 6px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

</style>
